[pytest]
testpaths = .
python_files = test_*.py
# Avoid collecting generated/nested worktrees that mirror test module names
# and trigger import-mismatch errors during full-suite discovery.
norecursedirs =
    data/artifacts
    data/manual_worktrees
    data/deploy_worktrees
    data/worktrees
    .codexbot_tmp
    .codexbot_preview
    .codex_backups
    .git
    .venv
    venv
    node_modules
    output
    vendor
    omnicrewapp.android

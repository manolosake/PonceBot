<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Visual Pipeline Fixture</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1d4ed8;
      --ink: #e2e8f0;
      --accent: #f97316;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, var(--bg2), var(--bg1));
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
    }
    .card {
      width: min(92vw, 880px);
      border: 2px solid color-mix(in srgb, var(--ink) 30%, transparent);
      border-radius: 16px;
      padding: 28px;
      background: color-mix(in srgb, #0b1220 75%, #1e293b 25%);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.45);
    }
    h1 { margin: 0 0 10px; font-size: clamp(24px, 4vw, 44px); }
    p { margin: 0 0 16px; line-height: 1.45; }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #111827;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>SRE Visual Pipeline Fixture</h1>
    <p>Fixture preview used to smoke-test desktop/tablet/mobile capture and manifest packaging.</p>
    <span class="pill">fixture-preview-v1</span>
  </main>
</body>
</html>
